<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>无境深蓝 - 海洋垃圾溯源测试</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        .debug { background: #f5f5f5; padding: 15px; border-radius: 5px; white-space: pre-wrap; font-size: 12px; max-height: 400px; overflow-y: auto; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 5px; display: none; }
    </style>
</head>
<body>
    <h1>海洋垃圾溯源分析 - 简化测试</h1>
    <button onclick="testAPI()">测试API调用</button>
    <button onclick="clearLog()">清空日志</button>
    
    <h3>调试日志:</h3>
    <div id="debug" class="debug"></div>
    
    <h3>解析结果:</h3>
    <div id="result"></div>

    <script>
        const API_URL = 'http://localhost:8080/trace';
        const TOKEN = 'eyJhbGciOiJSUzI1NiIsImtpZCI6IjBkYzU5M2IxLTNmYWUtNGM2NC1hYTJhLTc3MzgzMjQ0MzM2MSJ9.eyJpc3MiOiJodHRwczovL2FwaS5jb3plLmNuIiwiYXVkIjpbIlVJSXRRTWlOdlA3RGVoN2k2b3ZtcWY1dk9rd1ZYWHZJIl0sImV4cCI6ODIxMDI2Njg3Njc5OSwiaWF0IjoxNzc3Nzk3NTAyLCJzdWIiOiJzcGlmZmU6Ly9hcGkuY296ZS5jbi93b3JrbG9hZF9pZGVudGl0eS9pZDo3NjM1NTcwMjE1MTA2OTA0MDY0Iiwic3JjIjoiaW5ib3VuZF9hdXRoX2FjY2Vzc190b2tlbl9pZDo3NjM1NTgyMTMyNDgzNTIyNjAyIn0.YhrF7AvMyR6-F1gc74MpO3Gjmyg5w5HI8_VfflUt0ytuQhUa7Yo8IrQwCLryjdAYdyDBRHQW26WSv1DZnU_BuT9SXgsYL-SYhFdq8d2KBizCmBm_3Y-4GTQal4ksJwfbQa3osUfJzFJp0fst_QFC-WuKtEw8ds4Id1AyyWVI9HUAXP8MRGs_Pnj9UlrJkpYh_6DM1jo_E0VmdVNAOHdw45D7BwN1YtxlAoVbG_KMY2W7nncaF8_HebL-M_P-RA_bxk65r39P-Jb5dzMb6kXJmLTufwFJ70qCP0l_Eq70nIeXoEwEtIexmya2eTUKzlR2utaY8cqlLzS9BXME3Es7zA';
        const PROJECT_ID = '7635556815685730339';

        function log(message, type = 'info') {
            const div = document.getElementById('debug');
            const span = document.createElement('span');
            span.className = type;
            span.textContent = `[${new Date().toLocaleTimeString()}] ${message}\n`;
            div.appendChild(span);
            div.scrollTop = div.scrollHeight;
            console.log(message);
        }

        function clearLog() {
            document.getElementById('debug').innerHTML = '';
            document.getElementById('result').style.display = 'none';
        }

        function displayResult(data) {
            const div = document.getElementById('result');
            div.style.display = 'block';
            div.innerHTML = `
                <h4>特征分析:</h4>
                <p>类型: ${data.features?.category || 'N/A'}</p>
                <p>材质: ${data.features?.material || 'N/A'}</p>
                <p>尺寸: ${data.features?.size || 'N/A'}</p>
                <p>文字: ${data.features?.文字 || 'N/A'}</p>
                <p>特征: ${(data.features?.特征 || []).join(', ')}</p>
                
                <h4>来源分析:</h4>
                <pre>${JSON.stringify(data.source_analysis, null, 2)}</pre>
                
                <h4>扩散路径:</h4>
                <p>方向: ${data.diffusion?.方向 || 'N/A'}</p>
                <p>范围: ${data.diffusion?.范围 || 'N/A'}</p>
                <p>时间线: ${data.diffusion?.时间线 || 'N/A'}</p>
                <p>高风险区域: ${(data.diffusion?.高风险区域 || []).join(', ')}</p>
                
                <h4>置信度: ${data.confidence || 'N/A'}</h4>
            `;
        }

        async function testAPI() {
            log('开始测试API调用...', 'info');
            
            const sessionId = 'test-' + Date.now();
            
            const payload = {
                "content": {
                    "query": {
                        "prompt": [
                            {
                                "type": "text",
                                "content": {
                                    "text": `你是一个专业的海洋垃圾溯源分析专家。请分析图片中的垃圾并提供详细报告。
请严格按照JSON格式输出：
{
  "features": {
    "category": "垃圾类型",
    "material": "材质",
    "size": "小/中/大型",
    "文字": "识别到的文字",
    "特征": ["特征1", "特征2"]
  },
  "source_analysis": {
    "渔业活动": 0.00,
    "旅游活动": 0.00,
    "船舶活动": 0.00,
    "沿海居民": 0.00,
    "工业活动": 0.00,
    "不明来源": 0.00
  },
  "diffusion": {
    "方向": "扩散方向",
    "范围": "扩散范围",
    "时间线": "时间线",
    "高风险区域": ["区域1", "区域2"]
  },
  "confidence": 0.85
}`
                                }
                            }
                        ]
                    }
                },
                "type": "query",
                "session_id": sessionId,
                "project_id": PROJECT_ID
            };

            try {
                log(`发送请求到: ${API_URL}`, 'info');
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + TOKEN,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                log(`HTTP状态: ${response.status}`, response.ok ? 'success' : 'error');

                if (!response.ok) {
                    const errorText = await response.text();
                    log(`API错误: ${errorText}`, 'error');
                    return;
                }

                const result = await response.json();
                log(`响应状态: ${result.status}`, result.status === 'success' ? 'success' : 'error');
                
                if (result.status === 'success') {
                    log('✅ 成功获取分析结果！', 'success');
                    displayResult(result.data);
                } else {
                    log(`❌ 错误: ${result.message}`, 'error');
                    if (result.answer) {
                        log(`原始answer: ${result.answer}`, 'info');
                    }
                }

            } catch (error) {
                log(`❌ 请求失败: ${error.message}`, 'error');
                log('可能原因: 后端代理服务器未启动或CORS问题', 'error');
            }
        }
    </script>
</body>
</html>
